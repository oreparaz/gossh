name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race -timeout 240s ./...
  # A short fuzz smoke — catches regressions in the parsers without
  # running forever.
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - run: go test -fuzz=FuzzParse -fuzztime=30s ./internal/authkeys/
      - run: go test -fuzz=FuzzParseLocal -fuzztime=20s ./internal/forward/
      - run: go test -fuzz=FuzzParseClient -fuzztime=20s ./internal/sshconfig/
