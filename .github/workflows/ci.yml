name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
          cache: true
      - name: install integration deps
        # netcat backs the ProxyCommand tests; tmux backs the
        # session-persistence test; openssh-{client,server} back
        # the interop tests against the system ssh / sshd.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            netcat-openbsd tmux openssh-client openssh-server
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            echo "::error::go files need formatting; run 'go fmt ./...'"
            exit 1
          fi
      - name: go vet
        run: make vet GO=go
      - name: go build
        run: make build GO=go
      - name: go test (-race, all packages)
        # Covers unit + integration + e2e (TestE2E*, TestSCP*,
        # TestProxyCommand*, real-PTY tests via creack/pty).
        # Same command as `make test` but with GO=go so we use
        # the toolchain installed by setup-go.
        run: make test GO=go

  multi-distro:
    # Cross-distro compatibility matrix. The host runner stays on
    # ubuntu-latest (so actions/checkout, etc. just work), and we
    # use `docker run` to execute the test suite inside each target
    # distro. Same scripts/distro-test.sh that `make docker-test`
    # uses locally.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: test  # avoid burning matrix minutes if the main test job is broken
    strategy:
      fail-fast: false  # show all distro failures, not just the first
      matrix:
        image:
          - alpine:edge        # musl + busybox; highest signal
          - debian:12          # glibc-stable canary
          - fedora:latest      # rolling RPM, recent OpenSSH
          - ubuntu:24.04       # current Ubuntu LTS
    steps:
      - uses: actions/checkout@v4
      - name: test in ${{ matrix.image }}
        run: |
          docker run --rm \
            -v "$PWD:/src:ro" \
            "${{ matrix.image }}" \
            /src/scripts/distro-test.sh

  fuzz:
    # 70-second smoke per parser. Real fuzz runs go on a dev box;
    # CI just guards against trivial regressions in the corpora.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
          cache: true
      # `-fuzz` takes a regex — anchor it so we always pick exactly
      # one target. Without `^…$`, FuzzParse prefix-matches both
      # FuzzParse and FuzzParseHostPort and Go errors out.
      - run: go test -fuzz='^FuzzParse$' -fuzztime=30s ./internal/authkeys/
      - run: go test -fuzz='^FuzzParseLocal$' -fuzztime=20s ./internal/forward/
      - run: go test -fuzz='^FuzzParseClient$' -fuzztime=20s ./internal/sshconfig/
